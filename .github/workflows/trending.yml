name: Trending Content Discovery

on:
  schedule:
    - cron: '0 5 * * *'   # Daily 05:00 UTC = 07:00 CEST (before first FR/IT posting slot)
  workflow_dispatch:

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Google Trends → articles
        run: node src/scrapers/google-trends.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Competitor FB pages → trending signals + articles
        run: node src/scrapers/trending-pages.js
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          FB_ACCESS_TOKEN_FR:  ${{ secrets.FB_ACCESS_TOKEN_FR }}
          FB_ACCESS_TOKEN_IT:  ${{ secrets.FB_ACCESS_TOKEN_IT }}
