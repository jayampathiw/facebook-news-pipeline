name: Trending Content Discovery

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signal-studio
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}
          path: content

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: content/package-lock.json

      - name: Install dependencies
        working-directory: content
        run: npm ci

      - name: Google Trends scraper
        working-directory: content
        run: npm run google-trends
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Competitor FB pages scraper
        working-directory: content
        run: npm run trending-pages
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          FB_ACCESS_TOKEN_FR:  ${{ secrets.FB_ACCESS_TOKEN_FR }}
          FB_ACCESS_TOKEN_IT:  ${{ secrets.FB_ACCESS_TOKEN_IT }}
