name: Fetch News Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signal-studio
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}
          path: content

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: content/package-lock.json

      - name: Install dependencies
        working-directory: content
        run: npm ci

      - name: Run pipeline
        working-directory: content
        run: npm run news
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_KEY:      ${{ secrets.ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL:    ${{ secrets.ANTHROPIC_MODEL }}
          FAL_KEY:            ${{ secrets.FAL_KEY }}
          FB_PAGE_ID_FR:      ${{ secrets.FB_PAGE_ID_FR }}
          FB_ACCESS_TOKEN_FR: ${{ secrets.FB_ACCESS_TOKEN_FR }}
          FB_PAGE_ID_IT:      ${{ secrets.FB_PAGE_ID_IT }}
          FB_ACCESS_TOKEN_IT: ${{ secrets.FB_ACCESS_TOKEN_IT }}
