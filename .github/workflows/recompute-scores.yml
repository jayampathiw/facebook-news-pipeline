name: Recompute Publish Scores

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  recompute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signal-studio
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}
          path: content

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: content/package-lock.json

      - name: Install dependencies
        working-directory: content
        run: npm ci

      - name: Recompute publish scores
        working-directory: content
        run: npm run recompute-scores
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
