name: Scrape Post Metrics

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signal-studio
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}
          path: content

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: content/package-lock.json

      - name: Install dependencies
        working-directory: content
        run: npm ci

      - name: Scrape post metrics
        working-directory: content
        run: npm run scrape-metrics
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:             ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FAL_KEY:                  ${{ secrets.FAL_KEY }}
          FB_ACCESS_TOKEN_FR:       ${{ secrets.FB_ACCESS_TOKEN_FR }}
          FB_ACCESS_TOKEN_IT:       ${{ secrets.FB_ACCESS_TOKEN_IT }}
