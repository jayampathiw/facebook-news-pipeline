name: Fetch News

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout signal-studio (private)
        uses: actions/checkout@v4
        with:
          repository: jayampathiw/signal-studio
          ssh-key: ${{ secrets.SIGNAL_STUDIO_DEPLOY_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news pipeline
        run: npm run news
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FB_PAGE_ID_FR: ${{ secrets.FB_PAGE_ID_FR }}
          FB_ACCESS_TOKEN_FR: ${{ secrets.FB_ACCESS_TOKEN_FR }}
          FB_PAGE_ID_IT: ${{ secrets.FB_PAGE_ID_IT }}
          FB_ACCESS_TOKEN_IT: ${{ secrets.FB_ACCESS_TOKEN_IT }}
